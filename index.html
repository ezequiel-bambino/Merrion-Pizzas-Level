<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MERRIONS SHOP</title>

<style>
body{
  font-family: Arial;
  padding:20px;
  text-align:center;
}

.logo{
  width:200px;
  margin:auto;
  display:block;
  margin-bottom:10px;
}

h1{
  font-size:32px;
  margin-bottom:5px;
}

.date{
  color:#777;
  margin-bottom:25px;
}

/* TABS */
.tab-buttons button{
  padding:10px 18px;
  font-size:18px;
  margin:4px;
}

/* FORM */
.row{
  display:grid;
  grid-template-columns:auto 80px 80px;
  gap:10px;
  align-items:center;
  max-width:600px;
  margin:auto;
  margin-bottom:14px;
}

.ingredient{
  font-weight:bold;
  text-align:left;
}

.unit{
  font-size:13px;
  color:#666;
  text-align:left;
}

.row input{
  height:35px;
  font-size:16px;
  text-align:center;
}

/* SUBMIT */
#submitFormBtn{
  padding:8px 16px;
  font-size:16px;
  margin-top:10px;
}

/* TABLE */
.dataTable{
  width:100%;
  max-width:650px;
  margin:auto;
  border-collapse:collapse;
}

.dataTable th{
  text-align:center;
  padding:10px;
  border-bottom:2px solid #ddd;
  font-size:15px;
}

.dataTable td{
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:16px;
  text-align:center;
}

.prep{
  font-weight:bold;
  text-align:left;
}
</style>
</head>

<body>

<img src="icon.png" class="logo">
<h1>MERRIONS SHOP</h1>
<div id="todayDate" class="date"></div>

<div class="tab-buttons">
  <button onclick="showTab('form')">Pizza Form</button>
  <button onclick="showTab('lastDrop')">Last Drop</button>
</div>

<div id="tab"></div>

<script>
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbyntRpe-cQiLintI7Qtp_9cY4H1WhZflIZCJEmngplZLwWmE67-B9M8_HW4bnxg2iQ/exec";

document.getElementById("todayDate").innerText =
  new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'});

/* ================= TABS ================= */
function showTab(t){
  document.getElementById("tab").innerHTML="";
  if(t==="form") loadForm();
  if(t==="lastDrop") loadLastDrop();
}

/* ================= LOAD FORM ================= */
async function loadForm(){
  const r = await fetch(SCRIPT_URL+"?action=getPizzas");
  const pizzas = await r.json();

  const tab = document.getElementById("tab");
  tab.innerHTML=`
    <div>
      <input id="chefName" placeholder="Chef name">
      <select id="weather">
        <option value="">Weather</option>
        <option>Sunny</option>
        <option>Cloudy</option>
        <option>Rainy</option>
        <option>Storm</option>
      </select>
      <select id="traffic">
        <option value="">Traffic</option>
        <option>Quiet</option>
        <option>Normal</option>
        <option>Busy</option>
      </select>
    </div>
  `;

  const container = document.createElement("div");
  pizzas.forEach(p=>{
    const row = document.createElement("div");
    row.className="row";
    row.innerHTML=`
      <div class="ingredient">${p.name}</div>
      <input type="number" placeholder="Stock Level" id="stock_${p.name}">
      <input type="number" placeholder="Sold Pizza" id="sold_${p.name}">
    `;
    container.appendChild(row);
  });

  tab.appendChild(container);

  const submitBtn = document.createElement("button");
  submitBtn.id="submitFormBtn";
  submitBtn.innerText="SUBMIT";
  submitBtn.onclick=submitForm;
  tab.appendChild(submitBtn);
}

/* ================= SUBMIT FORM ================= */
async function submitForm(){
  const chef = document.getElementById("chefName").value;
  const weather = document.getElementById("weather").value;
  const traffic = document.getElementById("traffic").value;

  if(!chef){ alert("Please enter chef name"); return; }

  const rows = document.querySelectorAll(".row");
  const pizzas = [];
  rows.forEach(r=>{
    const name = r.querySelector(".ingredient").innerText;
    const stockLevel = Number(r.querySelector(`#stock_${name}`).value) || 0;
    const soldPizza = Number(r.querySelector(`#sold_${name}`).value) || 0;
    pizzas.push({name, stockLevel, soldPizza});
  });

  const payload = {chef, weather, traffic, pizzas};

  const res = await fetch(SCRIPT_URL+"?action=submitPizzaForm&data="+encodeURIComponent(JSON.stringify(payload)));
  const result = await res.json();
  if(result.success) alert("Form submitted!");
}

/* ================= LOAD LAST DROP ================= */
async function loadLastDrop(){
  const r = await fetch(SCRIPT_URL+"?action=getLastDrop");
  const data = await r.json();

  let html=`<table class="dataTable">
  <tr><th>Pizza</th><th>Last Drop</th></tr>`;

  data.forEach(d=>{
    html+=`<tr><td class="prep">${d.pizza}</td><td>${d.lastDrop}</td></tr>`;
  });

  html+="</table>";
  document.getElementById("tab").innerHTML=html;
}
</script>

</body>
</html>
