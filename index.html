<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Merrion Shop</title>
<link rel="manifest" href="manifest.json">

<style>
html, body { touch-action: manipulation; -ms-touch-action: manipulation; overscroll-behavior: contain; }
body { font-family: Arial; font-size: 18px; padding: 20px; text-align: center; }
button.tabBtn { font-size: 20px; padding: 10px 20px; margin: 5px; }
.hidden { display: none; }
.row { display: grid; grid-template-columns: auto 80px 80px; gap: 10px; margin-bottom: 15px; align-items: center; max-width: 600px; margin-left:auto;margin-right:auto; }
label { text-align:left; font-weight:600; }
input, select { font-size: 18px; padding:4px; width:100%; }
.orderTitle { margin-top:20px; font-weight:600; font-size:20px; text-align:left; max-width:600px; margin-left:auto;margin-right:auto; margin-bottom:10px; }
</style>
</head>
<body>

<h2>Merrion Shop</h2>

<div>
  <button class="tabBtn" onclick="showTab('formTab')">Pizza Form</button>
  <button class="tabBtn" onclick="showTab('lastDropTab')">Last Drop</button>
</div>

<div id="formTab">
  <div class="row">
    <label for="chef">Chef Name:</label>
    <input type="text" id="chef">
  </div>
  <div class="row">
    <label for="weather">How's gonna be the weather?</label>
    <select id="weather">
      <option value="Sunny">Sunny</option>
      <option value="Cloudy">Cloudy</option>
      <option value="Rainy">Rainy</option>
      <option value="Storm">Storm</option>
    </select>
  </div>
  <div class="row">
    <label for="traffic">How's the day going?</label>
    <select id="traffic">
      <option value="Quiet">Quiet</option>
      <option value="Normal">Normal</option>
      <option value="Busy">Busy</option>
    </select>
  </div>

  <div class="orderTitle">Pizzas</div>
  <div id="pizzaContainer"></div>

  <button onclick="submitForm()" style="font-size:22px; padding:10px 30px; margin-top:15px;">Submit</button>
</div>

<div id="lastDropTab" class="hidden">
  <div class="orderTitle">Last Drop Info</div>
  <div id="lastDropContainer"></div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlfCluOMeKpteLLdKvqtm3D24civu_4LolQnxosvSCg9uRTc9_PKBQUPC7Afd-qbkd/exec";

function showTab(tabId) {
  document.getElementById("formTab").classList.add("hidden");
  document.getElementById("lastDropTab").classList.add("hidden");
  document.getElementById(tabId).classList.remove("hidden");
  if(tabId==='formTab') loadPizzas();
  if(tabId==='lastDropTab') loadLastDrop();
}

async function loadPizzas() {
  const container = document.getElementById("pizzaContainer");
  container.innerHTML = "";
  const res = await google.script.run.withReturnValue().getPizzas();
  const data = await res;
  data.forEach(p => {
    const div = document.createElement("div");
    div.className="row";
    div.innerHTML = `
      <label>${p.name}</label>
      <input type="number" placeholder="Stock" min="0" id="stock_${p.name}">
      <input type="number" placeholder="Sold" min="0" id="sold_${p.name}">
    `;
    container.appendChild(div);
  });
}

async function loadLastDrop() {
  const container = document.getElementById("lastDropContainer");
  container.innerHTML = "";
  const res = await google.script.run.withReturnValue().getLastDrop();
  const data = await res;
  data.forEach(p => {
    const div = document.createElement("div");
    div.className="row";
    div.innerHTML = `<label>${p.pizza}</label><input type="text" value="${p.lastDrop}" readonly>`;
    container.appendChild(div);
  });
}

function submitForm() {
  const chef = document.getElementById("chef").value;
  const weather = document.getElementById("weather").value;
  const traffic = document.getElementById("traffic").value;
  if(!chef) { alert("Please enter your name"); return; }

  const pizzaRows = document.getElementById("pizzaContainer").children;
  const formData = [];
  for(let row of pizzaRows){
    const pizzaName = row.querySelector("label").innerText;
    const stock = Number(row.querySelector(`#stock_${pizzaName}`).value || 0);
    const sold = Number(row.querySelector(`#sold_${pizzaName}`).value || 0);
    formData.push({ pizza: pizzaName, stock, sold, chef, weather, traffic });
  }

  google.script.run.withSuccessHandler(()=>{
    alert("Form submitted!");
    // limpiar inputs
    document.getElementById("chef").value="";
    document.getElementById("pizzaContainer").querySelectorAll("input").forEach(i=>i.value="");
  }).submitPizzaForm(formData);
}

// Cargar Pizza Form por defecto
showTab('formTab');
</script>
</body>
</html>
