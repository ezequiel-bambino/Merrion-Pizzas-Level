<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Merrion Shop</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.logo{
  width:140px;
  margin:auto;
  display:block;
}

.title{
  font-size:28px; 
  margin-top:10px;
}

.date{
  font-size:14px;
  color:#777;
  margin-bottom:15px;
}

.tabBtn{
  padding:15px 25px;
  margin:5px;
  font-size:22px; 
}

.section{
  display:none;
}

.active{
  display:block;
}

.left{
  max-width:500px;
  margin:0 auto;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:8px 0;
}

.row span, .row b{
  display:inline-block;
  min-width:120px;
  font-size:20px; 
}

.row input, .row select{
  width:60px; /* casi cuadrados */
  font-size:20px;
  text-align:center; 
}

.row input.whole{
  text-align:right; /* Whole pies alineados a la derecha */
}

.row input.slice{
  text-align:center;
}

.bigInput{
  font-size:22px;
  width:220px;
  text-align:center;
  margin:20px auto 15px;
}

select{
  width:200px; /* dropdown más largo */
}

button{
  margin-top:20px;
  font-size:22px;
}

.hidden{
  display:none;
}

.bold{
  font-weight:bold;
}

#lastUpdate{
  margin-top:10px;
}

/* Last Drop: grid tabla centrada */
#dropData{
  display:grid;
  grid-template-columns: auto 60px; /* pizza | qty */
  justify-content:center;
  gap:20px;
  row-gap:6px;
  margin-top:10px;
}

#dropData .header{
  font-weight:bold;
  font-size:22px; /* más grande que antes */
}

#dropData .cell{
  text-align:left;
  font-size:20px;
}
#dropData .cell.qty{
  text-align:right;
  font-size:20px;
}
</style>
</head>

<body>

<img src="icon.png" class="logo">

<div class="title">MERRION SHOP</div>
<div id="todayDate" class="date"></div>

<button class="tabBtn" onclick="showTab('stock')">Stock Form</button>
<button class="tabBtn" onclick="showTab('drop')">Last Drop</button>

<!-- STOCK -->
<div id="stock" class="section">

<input id="stockUser" class="bigInput" placeholder="Your name">

<div class="left">

<div class="row">
  <span>Weather Forecast</span>
  <select id="weather">
    <option value=""></option>
    <option>Sunny</option>
    <option>Cloudy</option>
    <option>Rainy</option>
    <option>Storm</option>
  </select>
</div>

<div class="row">
  <span>How's today going?</span>
  <select id="traffic">
    <option value=""></option>
    <option>Quiet</option>
    <option>Normal</option>
    <option>Busy</option>
  </select>
</div>

<h3 style="text-align:center;">Stock Info</h3>

<div id="stockForm"></div>

<button id="submitStockBtn" onclick="submitStock()">Submit Stock</button>
<button id="newBtn" class="hidden" onclick="resetForm()">New Submit</button>
<div id="lastUpdate" class="hidden"></div>

</div>
</div>

<!-- DROP -->
<div id="drop" class="section">
  <h3>Last Drop Info</h3>
  <div id="dropData">
    <div class="header cell">Pizza</div>
    <div class="header cell qty">QTY</div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbzCkV1ETniuZLTvxvV4IJNJ2hoRBs_0qyTOCtyhxMS4QHAxDDGVdl8O3JCSnGOj0G8a/exec";

/* DATE */
function setDate(){
  const today = new Date();
  document.getElementById("todayDate").innerText =
    today.toLocaleDateString('en-GB',{
      weekday:'long',
      day:'numeric',
      month:'long'
    });
}

/* TAB CONTROL */
function showTab(tab){
  document.querySelectorAll(".section")
    .forEach(s => s.classList.remove("active"));

  document.getElementById(tab).classList.add("active");

  if(tab === "stock"){
    if(!window.loaded){
      loadPizzas();
      window.loaded = true;
    }
  }

  if(tab === "drop"){
    loadDrop();
  }
}

/* LOAD PIZZAS */
async function loadPizzas(){
  const res = await fetch(`${URL}?action=getPizzas`);
  const pizzas = await res.json();

  const formDiv = document.getElementById("stockForm");
  formDiv.innerHTML = ""; // limpio

  // headers
  formDiv.innerHTML += `
    <div class="row bold">
      <span>Pizza</span>
      <span>Whole pies</span>
      <span>Slices</span>
    </div>
  `;

  pizzas.forEach(p=>{
    formDiv.innerHTML += `
      <div class="row">
        <span class="bold">${p}</span>
        <input id="whole_${p}" class="whole" type="number" min="0">
        <input id="slice_${p}" class="slice" type="number" min="0" step="0.1">
      </div>
    `;
  });

  const saved = JSON.parse(localStorage.getItem("lastStockSubmit") || "{}");
  if(saved.pizzas){
    saved.pizzas.forEach(p=>{
      const whole = Math.floor(p.qty);
      const slice = Math.round((p.qty - whole) * 0.8*10)/10; // reconstruimos slice
      const elWhole = document.getElementById("whole_" + p.name);
      const elSlice = document.getElementById("slice_" + p.name);
      if(elWhole) elWhole.value = whole;
      if(elSlice) elSlice.value = slice;
    });
    if(saved.user) document.getElementById("stockUser").value = saved.user;
    if(saved.weather) document.getElementById("weather").value = saved.weather;
    if(saved.traffic) document.getElementById("traffic").value = saved.traffic;
    if(saved.timestamp) showLastUpdate(saved.timestamp);
    document.getElementById("newBtn").classList.remove("hidden");

    // BLOQUEAR inputs y botón submit
    document.getElementById("stockUser").disabled = true;
    document.getElementById("weather").disabled = true;
    document.getElementById("traffic").disabled = true;
    pizzas.forEach(p=>{
      const elWhole = document.getElementById("whole_" + p);
      const elSlice = document.getElementById("slice_" + p);
      if(elWhole) elWhole.disabled = true;
      if(elSlice) elSlice.disabled = true;
    });
    document.getElementById("submitStockBtn").disabled = true;
  }
}

/* RESET FORM */
function resetForm(){
  document.getElementById("stockUser").value = "";
  document.getElementById("weather").value = "";
  document.getElementById("traffic").value = "";
  document.querySelectorAll("[id^=whole_]").forEach(i=>{
    i.value = "";
    i.disabled = false;
  });
  document.querySelectorAll("[id^=slice_]").forEach(i=>{
    i.value = "";
    i.disabled = false;
  });
  document.getElementById("stockUser").disabled = false;
  document.getElementById("weather").disabled = false;
  document.getElementById("traffic").disabled = false;
  document.getElementById("submitStockBtn").disabled = false;
  document.getElementById("newBtn").classList.add("hidden");
  document.getElementById("lastUpdate").classList.add("hidden");
  localStorage.removeItem("lastStockSubmit");
}

/* BLOCK FORM */
function blockForm(){
  document.querySelectorAll("input, select, button")
    .forEach(el=>{
      if(el.classList.contains("tabBtn") || el.id === "newBtn") return;
      el.disabled = true;
    });
}

/* LAST UPDATE */
function showLastUpdate(date){
  const d = new Date(date);
  const text = d.toLocaleDateString('en-GB') +
    " at " + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});

  const el = document.getElementById("lastUpdate");
  el.innerText = "Last update at " + text;
  el.classList.remove("hidden");
}

/* SUBMIT STOCK */
async function submitStock(){
  if(!confirm("Are you sure?")) return;

  blockForm();

  const user = document.getElementById("stockUser").value;
  const weather = document.getElementById("weather").value;
  const traffic = document.getElementById("traffic").value;

  const pizzas=[];
  document.querySelectorAll("[id^=whole_]").forEach(i=>{
    const name = i.id.replace("whole_","");
    const whole = Number(i.value)||0;
    const slice = Number(document.getElementById("slice_" + name).value)||0;
    const total = whole + slice/0.8;
    pizzas.push({
      name,
      qty: total
    });
  });

  const res = await fetch(`${URL}?action=submitStock&data=${encodeURIComponent(JSON.stringify({
    user, weather, traffic, pizzas
  }))}`);

  const data = await res.json();

  alert("Submitted");

  // Guardamos en localStorage
  localStorage.setItem("lastStockSubmit", JSON.stringify({
    user, weather, traffic, pizzas, timestamp: data.timestamp
  }));

  showLastUpdate(data.timestamp);
  document.getElementById("newBtn").classList.remove("hidden");

  // BLOQUEAR inputs y botón submit
  document.getElementById("stockUser").disabled = true;
  document.getElementById("weather").disabled = true;
  document.getElementById("traffic").disabled = true;
  pizzas.forEach(p=>{
    const elWhole = document.getElementById("whole_" + p.name);
    const elSlice = document.getElementById("slice_" + p.name);
    if(elWhole) elWhole.disabled = true;
    if(elSlice) elSlice.disabled = true;
  });
  document.getElementById("submitStockBtn").disabled = true;
}

/* LOAD DROP */
async function loadDrop(){
  const res = await fetch(`${URL}?action=getLastDrop`);
  const data = await res.json();

  const div = document.getElementById("dropData");
  div.innerHTML = `
    <div class="header cell">Pizza</div>
    <div class="header cell qty">QTY</div>
  `;

  data.forEach(d=>{
    div.innerHTML += `
      <div class="cell">${d.pizza}</div>
      <div class="cell qty">${d.lastDrop}</div>
    `;
  });
}

setDate();
</script>

</body>
</html>
