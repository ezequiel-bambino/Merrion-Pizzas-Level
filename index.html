<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MERRIONS SHOP</title>

<style>
body{font-family:Arial;padding:20px;text-align:center;}
.logo{width:200px;margin:auto;display:block;margin-bottom:10px;}
h1{font-size:32px;margin-bottom:5px;}
.date{color:#777;margin-bottom:25px;}
.tab-buttons button{padding:10px 18px;font-size:18px;margin:4px;}
.row{display:grid;grid-template-columns:auto 80px 80px;gap:10px;align-items:center;margin-bottom:14px;max-width:600px;margin:auto;}
.ingredient{font-weight:bold;text-align:left;}
input{width:70px;font-size:16px;text-align:center;}
select{font-size:16px;}
#chefName{width:240px;height:36px;font-size:16px;margin-bottom:15px;text-align:center;}
.dataTable{width:100%;max-width:650px;margin:auto;border-collapse:collapse;}
.dataTable th, .dataTable td{padding:8px;border-bottom:1px solid #eee;font-size:14px;text-align:center;}
.prep{text-align:left;font-weight:bold;}
</style>
</head>
<body>

<img src="icon.png" class="logo">
<h1>MERRIONS SHOP</h1>
<div id="todayDate" class="date"></div>

<div class="tab-buttons">
  <button onclick="showTab('form')">Pizza Form</button>
  <button onclick="showTab('last')">Last Drop</button>
</div>

<div id="tab"></div>

<script>
const SCRIPT_URL = ""; // Dejar vacío mientras no tengas deploy

document.getElementById("todayDate").innerText =
  new Date().toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'});

async function showTab(tabName){
  const tab = document.getElementById("tab");
  tab.innerHTML="";
  if(tabName==='form') loadForm();
  if(tabName==='last') loadLastDrop();
}

/* =========================
   FORM TAB
========================= */
async function loadForm(){
  const res = await fetch(SCRIPT_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({action:"getPizzas"})
  });
  const pizzasData = await res.json();

  const tab=document.getElementById("tab");
  tab.innerHTML=`
    <input id="chefName" placeholder="Chef name">
    <br>
    Weather: <select id="weather">
      <option value="Sunny">Sunny</option>
      <option value="Cloudy">Cloudy</option>
      <option value="Rainy">Rainy</option>
      <option value="Storm">Storm</option>
    </select>
    Traffic: <select id="traffic">
      <option value="Quiet">Quiet</option>
      <option value="Normal">Normal</option>
      <option value="Busy">Busy</option>
    </select>
    <div id="pizzaContainer"></div>
    <button id="submitBtn">Submit</button>
  `;

  const container = document.getElementById("pizzaContainer");
  pizzasData.forEach(p=>{
    const div = document.createElement("div");
    div.className="row";
    div.innerHTML=`
      <div class="ingredient">${p.name}</div>
      <input type="number" placeholder="Stock" id="stock_${p.name}">
      <input type="number" placeholder="Sold" id="sold_${p.name}">
    `;
    container.appendChild(div);
  });

  document.getElementById("submitBtn").onclick = submitPizzaFormHTML;
}

/* =========================
   SUBMIT FORM
========================= */
async function submitPizzaFormHTML(){
  const chef = document.getElementById("chefName").value;
  if(!chef){ alert("Chef name required"); return; }

  const weather = document.getElementById("weather").value;
  const traffic = document.getElementById("traffic").value;

  const pizzasContainer = document.getElementById("pizzaContainer");
  const pizzas = Array.from(pizzasContainer.querySelectorAll(".row")).map(row=>{
    const name = row.querySelector(".ingredient").innerText;
    const stockLevel = Number(row.querySelector(`#stock_${name}`).value) || 0;
    const soldPizza = Number(row.querySelector(`#sold_${name}`).value) || 0;
    return {name, stockLevel, soldPizza};
  });

  const formData = {action:"submitPizzaForm", chef, weather, traffic, pizzas};

  const res = await fetch(SCRIPT_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(formData)
  });
  const result = await res.json();
  if(result.success) alert("Form submitted: "+result.saved+" pizzas");
}

/* =========================
   LAST DROP TAB
========================= */
async function loadLastDrop(){
  const res = await fetch(SCRIPT_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({action:"getLastDrop"})
  });
  const data = await res.json();

  let html=`<table class="dataTable"><tr><th>Pizza</th><th>Last Drop</th></tr>`;
  data.forEach(d=>{
    html+=`<tr><td class="prep">${d.pizza}</td><td>${d.lastDrop}</td></tr>`;
  });
  html+="</table>";
  document.getElementById("tab").innerHTML = html;
}
</script>

</body>
</html>
