<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Merrion Shop</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.logo{
  width:200px;
  margin:auto;
  display:block;
  margin-bottom:10px;
}

.title{
  font-size:28px; 
  font-weight:bold;
  margin-top:10px;
}

.date{
  font-size:14px;
  color:#777;
  margin-bottom:15px;
}

.tabBtn{
  padding:15px 25px;
  margin:5px;
  font-size:22px; 
  cursor:pointer;
}

.section{
  display:none;
}

.active{
  display:block;
}

.left{
  max-width:600px;
  margin:0 auto;
}

/* Status row styling - inline question and answer */
.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 20px 0;
  padding: 15px 20px;
  background-color: #f5f5f5;
  border-radius: 8px;
}

.status-row span {
  font-size: 20px;
  font-weight: bold;
  color: #333;
}

.status-row select {
  width: 200px;
  font-size: 18px;
  padding: 8px;
  text-align: center;
  text-align-last: center;
  border: 1px solid #ccc;
  border-radius: 5px;
  background-color: white;
}

/* Stock items - card style similar to closing form */
.stock-item {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 15px 0;
  border-radius: 8px;
  background-color: #f9f9f9;
}

.stock-item .pizza-name {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #333;
}

.stock-inputs {
  display: flex;
  justify-content: center;
  gap: 30px;
  align-items: center;
}

.stock-input-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.stock-input-group label {
  font-size: 16px;
  margin-bottom: 5px;
  color: #666;
}

.stock-input-group input {
  font-size: 20px;
  padding: 8px;
  width: 100px;
  text-align: center;
  border: 1px solid #ccc;
  border-radius: 5px;
}

/* Input styling */
input[type="number"] {
  -moz-appearance: textfield;
  appearance: textfield;
}

input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

input:focus::placeholder {
  color: transparent;
}

.bigInput{
  font-size:22px;
  width:250px;
  text-align:center;
  margin:20px auto 15px;
  padding:8px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

button{
  margin-top:20px;
  font-size:22px;
  padding:12px 24px;
  cursor:pointer;
  background-color:#4CAF50;
  color:white;
  border:none;
  border-radius:5px;
  transition: all 0.3s;
}

button:hover:not(:disabled) {
  background-color:#45a049;
  transform: translateY(-2px);
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

button.tabBtn{
  background-color:#2196F3;
}

button.tabBtn:hover {
  background-color:#1976D2;
}

.hidden{
  display:none;
}

.bold{
  font-weight:bold;
}

#lastUpdate, #lastClosingUpdate{
  margin-top:15px;
  font-size:16px;
  color:#666;
}

#dropData{
  display:grid;
  grid-template-columns: auto 80px;
  justify-content:center;
  gap:8px 30px;
  margin-top:20px;
}

#dropData .header{
  font-weight:bold;
  font-size:22px;
  padding-bottom:10px;
}

#dropData .cell{
  text-align:left;
  font-size:20px;
}

#dropData .cell.qty{
  text-align:right;
  font-size:20px;
}

/* CLOSING FORM STYLES */
.closing-item {
  border: 1px solid #ddd;
  padding: 20px;
  margin: 15px 0;
  border-radius: 8px;
  background-color: #f9f9f9;
}

.closing-item .pizza-name {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 15px;
  color: #333;
}

.status-selector {
  margin-bottom: 20px;
}

.status-option {
  display: inline-block;
  margin: 0 15px;
}

.status-option label {
  font-size: 18px;
  margin-left: 8px;
  cursor: pointer;
}

.status-option input[type="radio"] {
  transform: scale(1.3);
  margin-right: 5px;
  cursor: pointer;
}

.waste-section, .sellout-section {
  margin-top: 15px;
  padding: 15px;
  border-radius: 5px;
}

.waste-section {
  background-color: #fff3e0;
}

.sellout-section {
  background-color: #e8f5e9;
}

.waste-inputs {
  display: flex;
  justify-content: center;
  gap: 30px;
  align-items: center;
}

.waste-input-group {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.waste-input-group label {
  font-size: 16px;
  margin-bottom: 5px;
  color: #666;
}

.waste-input-group input {
  font-size: 20px;
  padding: 8px;
  width: 100px;
  text-align: center;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.sellout-section input {
  font-size: 20px;
  padding: 8px;
  width: 150px;
  text-align: center;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.note {
  font-size: 14px;
  color: #666;
  margin-top: 10px;
  font-style: italic;
}

/* General note section */
.general-note-section {
  margin-top: 30px;
  padding: 20px;
  background-color: #f0f7ff;
  border-radius: 8px;
  border: 1px solid #b3d9ff;
}

.general-note-section label {
  font-size: 20px;
  font-weight: bold;
  display: block;
  margin-bottom: 10px;
  color: #333;
}

.general-note-section textarea {
  width: 100%;
  min-height: 80px;
  padding: 12px;
  font-size: 16px;
  border: 1px solid #ccc;
  border-radius: 5px;
  resize: vertical;
  font-family: Arial, sans-serif;
  box-sizing: border-box;
}

.general-note-section textarea:focus {
  outline: none;
  border-color: #2196F3;
  box-shadow: 0 0 5px rgba(33,150,243,0.3);
}

/* Responsive */
@media (max-width: 600px) {
  .waste-inputs, .stock-inputs {
    flex-direction: column;
    gap: 15px;
  }
  
  .status-row {
    flex-direction: column;
    gap: 10px;
  }
  
  .status-row select {
    width: 100%;
  }
}
</style>
</head>

<body>

<img src="icon.png" class="logo" alt="Merrion Shop Logo" onerror="this.style.display='none'">

<div class="title">MERRION SHOP</div>
<div id="todayDate" class="date"></div>

<button class="tabBtn" onclick="showTab('stock')">Stock Form</button>
<button class="tabBtn" onclick="showTab('drop')">Last Drop</button>
<button class="tabBtn" onclick="showTab('closing')">Closing Form</button>

<!-- STOCK FORM - REDESIGNED WITH CARDS -->
<div id="stock" class="section">

<input id="stockUser" class="bigInput" placeholder="Your name" autocomplete="off">

<div class="left">

<div class="status-row">
  <span>Weather Forecast</span>
  <select id="weather">
    <option value="">Select weather...</option>
    <option>Sunny</option>
    <option>Cloudy</option>
    <option>Rainy</option>
    <option>Storm</option>
  </select>
</div>

<div class="status-row">
  <span>How's today going?</span>
  <select id="traffic">
    <option value="">Select traffic...</option>
    <option>Quiet</option>
    <option>Normal</option>
    <option>Busy</option>
  </select>
</div>

<h3 style="text-align:center; margin-top:30px;">Stock Info</h3>

<div id="stockForm"></div>

<button id="submitStockBtn" onclick="submitStock()">Submit Stock</button>
<button id="newBtn" class="hidden" onclick="resetForm()">New Submit</button>
<div id="lastUpdate" class="hidden"></div>

</div>
</div>

<!-- DROP SECTION -->
<div id="drop" class="section">
  <h3>Last Drop Info</h3>
  <div id="dropData">
    <div class="header cell">Pizza</div>
    <div class="header cell qty">QTY</div>
  </div>
  <button onclick="loadDrop()" style="margin-top:20px;">Refresh Data</button>
</div>

<!-- CLOSING FORM -->
<div id="closing" class="section">

  <input id="closingUser" class="bigInput" placeholder="Your name" autocomplete="off">

  <div class="left">
    <h3 style="text-align:center;">End of Day Report</h3>
    <p style="color:#666; margin-bottom:20px;">For each pizza, indicate if it sold out or if there was waste</p>

    <div id="closingForm"></div>
    
    <!-- General notes field -->
    <div class="general-note-section">
      <label for="generalNote">Additional Notes:</label>
      <textarea id="generalNote" placeholder="Any additional comments about today's service..."></textarea>
    </div>

    <button id="submitClosingBtn" onclick="submitClosing()">Submit End of Day Report</button>
    <button id="newClosingBtn" class="hidden" onclick="resetClosingForm()">New Report</button>
    <div id="lastClosingUpdate" class="hidden"></div>
  </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbwAsjdtQi-Z4SekT-bJIHJPSxkzPVtulT5PmT6BHc2nGS68EFXaG5l5UGsqk8mgD3sr/exec";

/* ===============================
   INPUT UTILITIES
=============================== */
// Function to improve number input experience
function setupNumberInput(input) {
  // When input gets focus, if value is 0, select it all
  input.addEventListener('focus', function() {
    if (this.value === '0') {
      this.select();
    }
  });
  
  // When clicked, select all if it's 0
  input.addEventListener('click', function() {
    if (this.value === '0') {
      this.select();
    }
  });
  
  // Prevent non-numeric characters
  input.addEventListener('keypress', function(e) {
    const char = String.fromCharCode(e.which);
    if (!/[0-9]/.test(char)) {
      e.preventDefault();
    }
  });
  
  // Reset to 0 if empty on blur
  input.addEventListener('blur', function() {
    if (this.value === '' || this.value === null) {
      this.value = '0';
    }
  });
}

/* ===============================
   DATE
=============================== */
function setDate(){
  const today = new Date();
  const options = {
    weekday:'long',
    day:'numeric',
    month:'long',
    year:'numeric'
  };
  document.getElementById("todayDate").innerText = today.toLocaleDateString('en-GB', options);
}

/* ===============================
   TAB CONTROL
=============================== */
function showTab(tab){
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(tab).classList.add("active");

  if(tab === "stock" && !window.stockLoaded){
    loadPizzas();
    window.stockLoaded = true;
  }

  if(tab === "drop"){
    loadDrop();
  }

  if(tab === "closing" && !window.closingLoaded){
    loadClosing();
    window.closingLoaded = true;
  }
}

/* ===============================
   STOCK FORM FUNCTIONS - CARD STYLE
=============================== */

async function loadPizzas(){
  try {
    const res = await fetch(`${URL}?action=getPizzas`);
    if (!res.ok) throw new Error('Network response was not ok');
    const pizzas = await res.json();

    const formDiv = document.getElementById("stockForm");
    formDiv.innerHTML = "";

    pizzas.forEach(p => {
      const pizzaName = p.replace(/[^a-zA-Z0-9]/g, '_');
      
      const itemDiv = document.createElement('div');
      itemDiv.className = 'stock-item';
      itemDiv.innerHTML = `
        <div class="pizza-name">${p}</div>
        <div class="stock-inputs">
          <div class="stock-input-group">
            <label>Whole Pies</label>
            <input type="number" id="whole_${pizzaName}" class="whole" min="0" value="0" placeholder="0">
          </div>
          <div class="stock-input-group">
            <label>Slices</label>
            <input type="number" id="slice_${pizzaName}" class="slice" min="0" max="7" step="1" value="0" placeholder="0">
          </div>
        </div>
      `;
      
      formDiv.appendChild(itemDiv);
      
      // Setup number inputs
      const wholeInput = document.getElementById(`whole_${pizzaName}`);
      const sliceInput = document.getElementById(`slice_${pizzaName}`);
      setupNumberInput(wholeInput);
      setupNumberInput(sliceInput);
    });

    const saved = JSON.parse(localStorage.getItem("lastStockSubmit") || "{}");
    if(saved.pizzas && saved.user){
      saved.pizzas.forEach(p=>{
        const whole = Math.floor(p.qty);
        const slice = Math.round((p.qty - whole) * 8);
        const pizzaName = p.name.replace(/[^a-zA-Z0-9]/g, '_');
        const elWhole = document.getElementById("whole_" + pizzaName);
        const elSlice = document.getElementById("slice_" + pizzaName);
        if(elWhole) elWhole.value = whole;
        if(elSlice) elSlice.value = slice;
      });
      if(saved.user) document.getElementById("stockUser").value = saved.user;
      if(saved.weather) document.getElementById("weather").value = saved.weather;
      if(saved.traffic) document.getElementById("traffic").value = saved.traffic;
      if(saved.timestamp) showLastUpdate(saved.timestamp);
      
      document.getElementById("newBtn").classList.remove("hidden");
      disableStockForm();
    }
  } catch (error) {
    console.error('Error loading pizzas:', error);
    alert('Error loading pizza list. Please try again.');
  }
}

function disableStockForm(){
  document.getElementById("stockUser").disabled = true;
  document.getElementById("weather").disabled = true;
  document.getElementById("traffic").disabled = true;
  document.querySelectorAll("#stockForm input").forEach(input => input.disabled = true);
  document.getElementById("submitStockBtn").disabled = true;
}

function enableStockForm(){
  document.getElementById("stockUser").disabled = false;
  document.getElementById("weather").disabled = false;
  document.getElementById("traffic").disabled = false;
  document.querySelectorAll("#stockForm input").forEach(input => input.disabled = false);
  document.getElementById("submitStockBtn").disabled = false;
}

async function submitStock(){
  const user = document.getElementById("stockUser").value.trim();
  const weather = document.getElementById("weather").value;
  const traffic = document.getElementById("traffic").value;

  if(!user || !weather || !traffic){
    alert("Please complete all fields (name, weather, and traffic)");
    return;
  }

  let valid = true;
  const pizzaData = [];
  
  document.querySelectorAll("[id^=whole_]").forEach(wholeInput => {
    const pizzaName = wholeInput.id.replace("whole_", "");
    const sliceInput = document.getElementById("slice_" + pizzaName);
    
    if(wholeInput.value === "" || sliceInput.value === ""){
      valid = false;
      return;
    }
    
    const whole = parseInt(wholeInput.value) || 0;
    const slice = parseInt(sliceInput.value) || 0;
    
    if(slice > 7){
      alert(`Slices must be between 0 and 7`);
      valid = false;
      return;
    }
    
    const originalName = getOriginalPizzaName(pizzaName);
    const total = whole + (slice/8);
    pizzaData.push({ name: originalName, qty: total });
  });

  if(!valid){ 
    alert("Please fill all pizza fields with valid numbers"); 
    return; 
  }
  
  if(!confirm("Are you sure you want to submit this stock data?")) return;

  try {
    disableStockForm();

    const res = await fetch(`${URL}?action=submitStock&data=${encodeURIComponent(JSON.stringify({
      user, weather, traffic, pizzas: pizzaData
    }))}`);
    
    if (!res.ok) throw new Error('Submission failed');
    const data = await res.json();

    alert("Stock data submitted successfully!");

    const savedPizzas = pizzaData.map(p => ({
      name: p.name,
      qty: p.qty
    }));
    
    localStorage.setItem("lastStockSubmit", JSON.stringify({
      user, weather, traffic, pizzas: savedPizzas, timestamp: data.timestamp
    }));

    showLastUpdate(data.timestamp);
    document.getElementById("newBtn").classList.remove("hidden");
  } catch (error) {
    console.error('Error submitting stock:', error);
    alert('Error submitting data. Please try again.');
    enableStockForm();
  }
}

function getOriginalPizzaName(encodedName) {
  const saved = JSON.parse(localStorage.getItem("lastStockSubmit") || "{}");
  if (saved.pizzas) {
    const found = saved.pizzas.find(p => p.name.replace(/[^a-zA-Z0-9]/g, '_') === encodedName);
    if (found) return found.name;
  }
  return encodedName.replace(/_/g, ' ');
}

function resetForm(){
  if(confirm("Are you sure you want to start a new stock form? This will clear all current data.")){
    document.getElementById("stockUser").value = "";
    document.getElementById("weather").value = "";
    document.getElementById("traffic").value = "";
    document.querySelectorAll("#stockForm input").forEach(input => input.value = "0");
    
    enableStockForm();
    
    document.getElementById("newBtn").classList.add("hidden");
    document.getElementById("lastUpdate").classList.add("hidden");
    localStorage.removeItem("lastStockSubmit");
  }
}

function showLastUpdate(timestamp){
  if(!timestamp) return;
  
  const d = new Date(timestamp);
  const text = d.toLocaleDateString('en-GB') + " at " + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  const el = document.getElementById("lastUpdate");
  el.innerText = "Last submitted: " + text;
  el.classList.remove("hidden");
}

async function loadDrop(){
  try {
    const res = await fetch(`${URL}?action=getLastDrop`);
    if (!res.ok) throw new Error('Network response was not ok');
    const data = await res.json();
    
    const div = document.getElementById("dropData");
    div.innerHTML = `<div class="header cell">Pizza</div><div class="header cell qty">QTY</div>`;
    
    if(data.length === 0){
      div.innerHTML += `<div class="cell" style="grid-column:1/-1;text-align:center;">No drop data available</div>`;
    } else {
      data.forEach(d=>{
        div.innerHTML += `<div class="cell">${d.pizza || 'Unknown'}</div><div class="cell qty">${d.lastDrop || 0}</div>`;
      });
    }
  } catch (error) {
    console.error('Error loading drop data:', error);
    const div = document.getElementById("dropData");
    div.innerHTML = `<div class="header cell">Pizza</div><div class="header cell qty">QTY</div>`;
    div.innerHTML += `<div class="cell" style="grid-column:1/-1;text-align:center;color:red;">Error loading data</div>`;
  }
}

/* ===============================
   CLOSING FORM FUNCTIONS
=============================== */

async function loadClosing(){
  try {
    const res = await fetch(`${URL}?action=getPizzas`);
    if (!res.ok) throw new Error('Network response was not ok');
    const pizzas = await res.json();
    
    const formDiv = document.getElementById("closingForm");
    formDiv.innerHTML = "";

    pizzas.forEach(p => {
      const pizzaName = p.replace(/[^a-zA-Z0-9]/g, '_');
      
      const itemDiv = document.createElement('div');
      itemDiv.className = 'closing-item';
      itemDiv.innerHTML = `
        <div class="pizza-name">${p}</div>
        
        <div class="status-selector">
          <span class="status-option">
            <input type="radio" name="status_${pizzaName}" id="waste_${pizzaName}" value="waste" checked>
            <label for="waste_${pizzaName}">Had Waste</label>
          </span>
          <span class="status-option">
            <input type="radio" name="status_${pizzaName}" id="soldout_${pizzaName}" value="soldout">
            <label for="soldout_${pizzaName}">Sold Out</label>
          </span>
        </div>
        
        <div id="wasteSection_${pizzaName}" class="waste-section">
          <div class="waste-inputs">
            <div class="waste-input-group">
              <label>Whole Pies</label>
              <input type="number" id="wasteWhole_${pizzaName}" min="0" value="0" placeholder="0">
            </div>
            <div class="waste-input-group">
              <label>Slices</label>
              <input type="number" id="wasteSlice_${pizzaName}" min="0" max="7" value="0" placeholder="0">
            </div>
          </div>
          <div class="note">Enter the amount left at end of day</div>
        </div>
        
        <div id="selloutSection_${pizzaName}" class="sellout-section hidden">
          <label>Sold out at:</label>
          <input type="time" id="sellout_${pizzaName}" value="">
          <div class="note">Time when the last slice was sold</div>
        </div>
      `;
      
      formDiv.appendChild(itemDiv);
      
      // Setup number inputs
      const wasteWhole = document.getElementById(`wasteWhole_${pizzaName}`);
      const wasteSlice = document.getElementById(`wasteSlice_${pizzaName}`);
      setupNumberInput(wasteWhole);
      setupNumberInput(wasteSlice);
      
      // Add event listeners for radio buttons
      const wasteRadio = document.getElementById(`waste_${pizzaName}`);
      const soldoutRadio = document.getElementById(`soldout_${pizzaName}`);
      const wasteSection = document.getElementById(`wasteSection_${pizzaName}`);
      const selloutSection = document.getElementById(`selloutSection_${pizzaName}`);
      
      wasteRadio.addEventListener('change', () => {
        wasteSection.classList.remove('hidden');
        selloutSection.classList.add('hidden');
        document.getElementById(`sellout_${pizzaName}`).value = '';
      });
      
      soldoutRadio.addEventListener('change', () => {
        wasteSection.classList.add('hidden');
        selloutSection.classList.remove('hidden');
        document.getElementById(`wasteWhole_${pizzaName}`).value = '0';
        document.getElementById(`wasteSlice_${pizzaName}`).value = '0';
      });
    });

    // Load saved data if exists
    const saved = JSON.parse(localStorage.getItem("lastClosingSubmit") || "{}");
    if(saved.pizzas && saved.user){
      saved.pizzas.forEach(p => {
        const pizzaName = p.name.replace(/[^a-zA-Z0-9]/g, '_');
        
        if(p.selloutTime) {
          // Was sold out
          const soldoutRadio = document.getElementById(`soldout_${pizzaName}`);
          if(soldoutRadio) {
            soldoutRadio.checked = true;
            document.getElementById(`wasteSection_${pizzaName}`).classList.add('hidden');
            document.getElementById(`selloutSection_${pizzaName}`).classList.remove('hidden');
            document.getElementById(`sellout_${pizzaName}`).value = p.selloutTime;
          }
        } else if(p.waste !== undefined) {
          // Had waste
          const wasteRadio = document.getElementById(`waste_${pizzaName}`);
          if(wasteRadio) {
            wasteRadio.checked = true;
            document.getElementById(`wasteWhole_${pizzaName}`).value = Math.floor(p.waste);
            document.getElementById(`wasteSlice_${pizzaName}`).value = Math.round((p.waste - Math.floor(p.waste)) * 8);
          }
        }
      });
      
      if(saved.user) document.getElementById("closingUser").value = saved.user;
      if(saved.note) document.getElementById("generalNote").value = saved.note;
      if(saved.timestamp) showLastClosingUpdate(saved.timestamp);
      
      document.getElementById("newClosingBtn").classList.remove("hidden");
      disableClosingForm();
    }
  } catch (error) {
    console.error('Error loading closing form:', error);
    alert('Error loading closing form. Please try again.');
  }
}

function disableClosingForm(){
  document.getElementById("closingUser").disabled = true;
  document.getElementById("generalNote").disabled = true;
  
  // Disable all inputs and radios in closing form
  document.querySelectorAll("#closingForm input, #closingForm button").forEach(el => {
    if(el.id !== 'newClosingBtn') el.disabled = true;
  });
  
  document.getElementById("submitClosingBtn").disabled = true;
}

function enableClosingForm(){
  document.getElementById("closingUser").disabled = false;
  document.getElementById("generalNote").disabled = false;
  
  // Enable all inputs and radios in closing form
  document.querySelectorAll("#closingForm input, #closingForm button").forEach(el => {
    el.disabled = false;
  });
  
  document.getElementById("submitClosingBtn").disabled = false;
}

async function submitClosing(){
  const user = document.getElementById("closingUser").value.trim();
  const generalNote = document.getElementById("generalNote").value.trim();
  
  if(!user){ 
    alert("Please enter your name"); 
    return; 
  }

  const closingData = [];
  let valid = true;
  
  document.querySelectorAll(".closing-item").forEach(item => {
    const pizzaNameElement = item.querySelector('.pizza-name');
    if(!pizzaNameElement) return;
    
    const originalName = pizzaNameElement.textContent;
    const pizzaName = originalName.replace(/[^a-zA-Z0-9]/g, '_');
    
    const isWaste = document.getElementById(`waste_${pizzaName}`).checked;
    
    if(isWaste) {
      // Validate waste
      const wasteWhole = document.getElementById(`wasteWhole_${pizzaName}`);
      const wasteSlice = document.getElementById(`wasteSlice_${pizzaName}`);
      
      if(wasteWhole.value === "" || wasteSlice.value === "") {
        alert(`Please fill waste amounts for ${originalName}`);
        valid = false;
        return;
      }
      
      const whole = parseInt(wasteWhole.value) || 0;
      const slice = parseInt(wasteSlice.value) || 0;
      
      if(slice > 7) {
        alert(`Slices must be between 0 and 7 for ${originalName}`);
        valid = false;
        return;
      }
      
      const wasteTotal = whole + (slice/8);
      closingData.push({
        name: originalName,
        waste: wasteTotal,
        selloutTime: null
      });
    } else {
      // Validate sellout
      const selloutTime = document.getElementById(`sellout_${pizzaName}`);
      
      if(!selloutTime.value) {
        alert(`Please enter sellout time for ${originalName}`);
        valid = false;
        return;
      }
      
      closingData.push({
        name: originalName,
        waste: 0,
        selloutTime: selloutTime.value
      });
    }
  });

  if(!valid) return;
  
  if(!confirm("Are you sure you want to submit this end of day report?")) return;

  try {
    disableClosingForm();

    const res = await fetch(`${URL}?action=submitClosing&data=${encodeURIComponent(JSON.stringify({
      user, 
      pizzas: closingData,
      note: generalNote
    }))}`);
    
    if (!res.ok) throw new Error('Submission failed');
    const data = await res.json();

    alert("End of day report submitted successfully!");

    localStorage.setItem("lastClosingSubmit", JSON.stringify({
      user, 
      pizzas: closingData,
      note: generalNote,
      timestamp: data.timestamp
    }));

    showLastClosingUpdate(data.timestamp);
    document.getElementById("newClosingBtn").classList.remove("hidden");
  } catch (error) {
    console.error('Error submitting closing data:', error);
    alert('Error submitting data. Please try again.');
    enableClosingForm();
  }
}

function resetClosingForm(){
  if(confirm("Are you sure you want to start a new report? This will clear all current data.")){
    document.getElementById("closingUser").value = "";
    document.getElementById("generalNote").value = "";
    
    // Reset all items to waste with 0 values
    document.querySelectorAll(".closing-item").forEach(item => {
      const pizzaNameElement = item.querySelector('.pizza-name');
      if(!pizzaNameElement) return;
      
      const pizzaName = pizzaNameElement.textContent.replace(/[^a-zA-Z0-9]/g, '_');
      
      // Set to waste mode
      document.getElementById(`waste_${pizzaName}`).checked = true;
      document.getElementById(`wasteSection_${pizzaName}`).classList.remove('hidden');
      document.getElementById(`selloutSection_${pizzaName}`).classList.add('hidden');
      
      // Clear values
      document.getElementById(`wasteWhole_${pizzaName}`).value = '0';
      document.getElementById(`wasteSlice_${pizzaName}`).value = '0';
      document.getElementById(`sellout_${pizzaName}`).value = '';
    });
    
    enableClosingForm();
    
    document.getElementById("newClosingBtn").classList.add("hidden");
    document.getElementById("lastClosingUpdate").classList.add("hidden");
    localStorage.removeItem("lastClosingSubmit");
  }
}

function showLastClosingUpdate(timestamp){
  if(!timestamp) return;
  
  const d = new Date(timestamp);
  const text = d.toLocaleDateString('en-GB') + " at " + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  const el = document.getElementById("lastClosingUpdate");
  el.innerText = "Last submitted: " + text;
  el.classList.remove("hidden");
}

// Initialize
setDate();

// Handle image loading error
document.querySelector('.logo').addEventListener('error', function() {
  this.style.display = 'none';
});

</script>
